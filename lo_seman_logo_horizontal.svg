<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">L. O. Seman logo</title>
  <desc id="desc">A logo for L. O. Seman combining optimization and machine learning through an LOS monogram and a clean wordmark.</desc>

  <defs>
    <linearGradient id="ring" x1="42" y1="48" x2="278" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#6D4AFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="route" x1="118" y1="246" x2="244" y2="109" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0B132B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="translate(32 20)" filter="url(#softShadow)">
    <rect x="0" y="0" width="320" height="320" rx="78" fill="#FFFFFF"/>

    <!-- L -->
    <path d="M78 68V235H157" stroke="#0B132B" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 151H118" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M78 109H104" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M115 235V209" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>

    <!-- O -->
    <circle cx="205" cy="155" r="82" stroke="url(#ring)" stroke-width="18"/>
    <circle cx="205" cy="155" r="53" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="7 9"/>

    <!-- S -->
    <path d="M238 103C222 88 189 90 175 112C163 130 178 146 202 151C229 157 244 168 240 188C236 207 209 218 181 210C168 206 157 201 148 193"
          stroke="url(#route)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ML nodes and graph -->
    <path d="M151 194L177 149L205 155L231 173L247 132" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M177 149L231 173M205 155L247 132" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <circle cx="151" cy="194" r="9" fill="#0F766E" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="177" cy="149" r="9" fill="#2563EB" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="205" cy="155" r="10" fill="#6D4AFF" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="231" cy="173" r="9" fill="#7C3AED" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="247" cy="132" r="8" fill="#14B8A6" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="125" cy="235" r="7" fill="#2563EB"/>
  </g>

  <g transform="translate(405 92)">
    <text x="0" y="94" fill="#0B132B"
          font-family="Inter, Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="104" font-weight="720" letter-spacing="-4">L. O.</text>

    <!-- Extra gap before Seman -->
    <text x="305" y="94" fill="#0B132B"
          font-family="Inter, Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="104" font-weight="720" letter-spacing="-4">S</text>
    <text x="375" y="94" fill="#0B132B"
          font-family="Inter, Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="104" font-weight="430" letter-spacing="-1.2">eman</text>

    <rect x="3" y="125" width="700" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="3" y="125" width="245" height="4" rx="2" fill="url(#ring)"/>

    <text x="3" y="177" fill="#64748B"
          font-family="Inter, Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif"
          font-size="24" font-weight="600" letter-spacing="5.2">OPTIMIZATION  •  MACHINE LEARNING</text>
  </g>
</svg>
