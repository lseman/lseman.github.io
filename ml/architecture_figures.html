<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Architecture Figures</title>
<script src="../engine/theme-manager.js"></script>
<script src="../engine/template-engine.js"></script>
<script src="../engine/loader.js"></script>
<style>
  :root {
    --blue-l: #dce8ff;   --blue-m: #6b9eff;   --blue-d: #2d5be3;
    --teal-l: #d4f0ec;   --teal-m: #5bc4b8;   --teal-d: #1e897e;
    --amber-l: #fdefd4;  --amber-m: #f5a623;  --amber-d: #c4780a;
    --rose-l: #fde0e0;   --rose-m: #f07575;   --rose-d: #c0392b;
    --purple-l: #ede0fd; --purple-m: #a678f5; --purple-d: #6c2eb0;
    --green-l: #d9f5de;  --green-m: #5bbf70;  --green-d: #237a38;
    --slate-l: #eef0f5;  --slate-m: #8a93a8;  --slate-d: #3a4460;
  }

  .architecture-gallery {
    display: grid;
    gap: 2rem;
  }

  .architecture-intro {
    display: grid;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .architecture-intro-card {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 1rem;
    padding: 1.25rem;
    box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
  }

  .architecture-intro-card h3 {
    font-family: "Sora", sans-serif;
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }

  .architecture-intro-card p,
  .architecture-intro-card li {
    color: #475569;
    line-height: 1.6;
    font-size: 0.95rem;
  }

  .architecture-intro-card ul {
    padding-left: 1rem;
  }

  .architecture-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
    gap: 32px;
  }

  .architecture-card {
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
  }

  .architecture-card--full {
    grid-column: 1 / -1;
  }

  .architecture-card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .architecture-card-header h2 {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .architecture-tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .tag-attention { background: var(--blue-l); color: var(--blue-d); }
  .tag-routing   { background: var(--amber-l); color: var(--amber-d); }
  .tag-splines   { background: var(--purple-l); color: var(--purple-d); }
  .tag-hybrid    { background: var(--teal-l); color: var(--teal-d); }

  .architecture-card-body {
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: auto;
  }

  .architecture-card svg {
    font-family: "Inter", sans-serif;
    max-width: 100%;
    height: auto;
  }

  .architecture-caption {
    padding: 12px 24px 20px;
    font-size: 0.82rem;
    color: #64748b;
    line-height: 1.6;
    border-top: 1px solid rgba(148, 163, 184, 0.18);
  }

  .architecture-gallery-note {
    text-align: center;
    font-size: 0.82rem;
    color: #64748b;
    padding-top: 0.25rem;
    font-family: "JetBrains Mono", monospace;
  }

  @media (min-width: 900px) {
    .architecture-intro {
      grid-template-columns: 1.3fr 1fr;
    }
  }

  @media (max-width: 640px) {
    .architecture-grid {
      grid-template-columns: 1fr;
    }

    .architecture-card-body {
      padding: 16px;
    }
  }
</style>
</head>
<body>
<template id="architecture-gallery-template">
  <div class="architecture-gallery">
    <div class="architecture-intro">
      <div class="architecture-intro-card">
        <h3>What This Page Covers</h3>
        <p>Reference figures for teaching core deep learning architectures, with emphasis on data flow, normalization placement, routing, and attention structure.</p>
      </div>
      <div class="architecture-intro-card">
        <h3>Suggested Use</h3>
        <ul>
          <li>Start with the Transformer encoder and encoder-decoder pair.</li>
          <li>Contrast dense FFNs with sparse expert routing in MoE.</li>
          <li>Use the attention taxonomy panel to compare complexity patterns.</li>
        </ul>
      </div>
    </div>
    <div class="architecture-grid">

  <!-- ═══════════════════════════════════════════════════
       FIGURE 1 — Transformer Encoder Block
  ═══════════════════════════════════════════════════ -->
  <div class="architecture-card">
    <div class="architecture-card-header">
      <h2>Transformer — Encoder Block</h2>
      <span class="architecture-tag tag-attention">Self-Attention</span>
    </div>
    <div class="architecture-card-body">
            <svg width="380" height="620" viewBox="0 0 380 620">
        <defs>
          <pattern id="hatch-anorm" patternUnits="userSpaceOnUse" width="7" height="7">
            <rect width="7" height="7" fill="#eef0f5"/>
            <line x1="0" y1="7" x2="7" y2="0" stroke="#8a93a8" stroke-width="0.9" stroke-opacity="0.45"/>
          </pattern>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
          </marker>
          <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#6b9eff"/>
          </marker>
        </defs>

        <!-- data flows UPWARD (higher y = earlier in pipeline) -->

        <!-- Input Embedding -->
        <rect x="90" y="560" width="200" height="36" rx="8" fill="#dce8ff" stroke="#6b9eff" stroke-width="1.5"/>
        <text x="190" y="583" text-anchor="middle" font-size="13" font-weight="600" fill="#2d5be3">Input Embedding</text>
        <!-- + Positional Encoding -->
        <rect x="90" y="498" width="200" height="36" rx="8" fill="#d9f5de" stroke="#5bbf70" stroke-width="1.5"/>
        <text x="190" y="521" text-anchor="middle" font-size="13" font-weight="600" fill="#237a38">+ Positional Encoding</text>
        <line x1="190" y1="560" x2="190" y2="536" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- ENCODER BLOCK boundary -->
        <rect x="28" y="92" width="324" height="400" rx="12" fill="none" stroke="#b0bcd8" stroke-width="1.5" stroke-dasharray="6 4"/>
        <text x="50" y="112" font-size="10" font-weight="600" fill="#8a93a8" letter-spacing="0.07em">ENCODER BLOCK  ×N  (Pre-Norm)</text>

        <!-- arrow pos-enc → block entry -->
        <line x1="190" y1="498" x2="190" y2="474" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- ── Sub-layer 1: Norm → Self-Attn → ⊕ ── -->
        <!-- Norm-1 -->
        <rect x="115" y="448" width="150" height="28" rx="0" fill="url(#hatch-anorm)" stroke="#5a6480" stroke-width="1.8"/>
        <text x="190" y="467" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a4460">Norm</text>
        <line x1="190" y1="448" x2="190" y2="424" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- Multi-Head Self-Attention -->
        <rect x="68" y="340" width="244" height="80" rx="10" fill="#dce8ff" stroke="#6b9eff" stroke-width="1.8"/>
        <text x="190" y="364" text-anchor="middle" font-size="13" font-weight="700" fill="#2d5be3">Multi-Head</text>
        <text x="190" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#2d5be3">Self-Attention</text>
        <rect x="84"  y="394" width="38" height="18" rx="4" fill="#2d5be3"/>
        <text x="103" y="407" text-anchor="middle" font-size="10" font-weight="700" fill="white">Q</text>
        <rect x="171" y="394" width="38" height="18" rx="4" fill="#2d5be3"/>
        <text x="190" y="407" text-anchor="middle" font-size="10" font-weight="700" fill="white">K</text>
        <rect x="258" y="394" width="38" height="18" rx="4" fill="#2d5be3"/>
        <text x="277" y="407" text-anchor="middle" font-size="10" font-weight="700" fill="white">V</text>
        <line x1="190" y1="340" x2="190" y2="316" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- ⊕ Add-1 -->
        <circle cx="190" cy="300" r="10" fill="white" stroke="#5a6480" stroke-width="1.8"/>
        <text x="190" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#3a4460">+</text>
        <!-- residual-1: pos-enc output → skip Norm+Attn → ⊕ Add-1 -->
        <path d="M90,498 C32,498 32,300 180,300" fill="none" stroke="#b0bcd8" stroke-width="1.4" stroke-dasharray="5 3"/>
        <line x1="190" y1="290" x2="190" y2="268" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- ── Sub-layer 2: Norm → FFN → ⊕ ── -->
        <!-- Norm-2 -->
        <rect x="115" y="248" width="150" height="28" rx="0" fill="url(#hatch-anorm)" stroke="#5a6480" stroke-width="1.8"/>
        <text x="190" y="267" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a4460">Norm</text>
        <line x1="190" y1="248" x2="190" y2="222" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- Feed-Forward Network -->
        <rect x="68" y="148" width="244" height="70" rx="10" fill="#fdefd4" stroke="#f5a623" stroke-width="1.8"/>
        <text x="190" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#c4780a">Feed-Forward Network</text>
        <rect x="86"  y="182" width="82" height="22" rx="4" fill="#f5a623" fill-opacity="0.25" stroke="#f5a623" stroke-width="1"/>
        <text x="127" y="197" text-anchor="middle" font-size="10" fill="#c4780a" font-weight="600">Linear + ReLU</text>
        <rect x="212" y="182" width="82" height="22" rx="4" fill="#f5a623" fill-opacity="0.25" stroke="#f5a623" stroke-width="1"/>
        <text x="253" y="197" text-anchor="middle" font-size="10" fill="#c4780a" font-weight="600">Linear</text>
        <line x1="168" y1="193" x2="212" y2="193" stroke="#f5a623" stroke-width="1.5" marker-end="url(#arr-blue)"/>
        <line x1="190" y1="148" x2="190" y2="124" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- ⊕ Add-2 -->
        <circle cx="190" cy="108" r="10" fill="white" stroke="#5a6480" stroke-width="1.8"/>
        <text x="190" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#3a4460">+</text>
        <!-- residual-2: ⊕ Add-1 output → skip Norm+FFN → ⊕ Add-2 -->
        <path d="M310,290 C354,290 354,108 200,108" fill="none" stroke="#b0bcd8" stroke-width="1.4" stroke-dasharray="5 3"/>

        <!-- Encoder Output -->
        <rect x="90" y="52" width="200" height="36" rx="8" fill="#ede0fd" stroke="#a678f5" stroke-width="1.5"/>
        <text x="190" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#6c2eb0">Encoder Output</text>
        <line x1="190" y1="98" x2="190" y2="90" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

        <!-- Legend -->
        <line x1="30" y1="32" x2="58" y2="32" stroke="#b0bcd8" stroke-width="1.4" stroke-dasharray="5 3"/>
        <text x="64" y="36" font-size="9.5" fill="#8a93a8">residual (bypasses Norm + sub-layer, adds at ⊕)</text>
      </svg>
    </div>
    <div class="architecture-caption">
      Pre-Norm encoder block: LayerNorm is applied <em>before</em> each sub-layer (attention, FFN). The residual connection bypasses both the Norm and the sub-layer, adding directly at the ⊕ symbol. This improves training stability vs. Post-Norm.
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       FIGURE 2 — Mixture of Experts
  ═══════════════════════════════════════════════════ -->
  <div class="architecture-card">
    <div class="architecture-card-header">
      <h2>Mixture of Experts (MoE)</h2>
      <span class="architecture-tag tag-routing">Sparse Routing</span>
    </div>
    <div class="architecture-card-body">
      <svg width="420" height="580" viewBox="0 0 420 580">
        <defs>
          <pattern id="hatch-anorm" patternUnits="userSpaceOnUse" width="7" height="7">
            <rect width="7" height="7" fill="#eef0f5"/>
            <line x1="0" y1="7" x2="7" y2="0" stroke="#8a93a8" stroke-width="0.9" stroke-opacity="0.45"/>
          </pattern>
          <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
          </marker>
          <marker id="arr2-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#f5a623"/>
          </marker>
          <marker id="arr2-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#c8cad0"/>
          </marker>
        </defs>

        <!-- ── Input Token ── -->
        <rect x="140" y="520" width="140" height="38" rx="8" fill="#dce8ff" stroke="#6b9eff" stroke-width="1.5"/>
        <text x="210" y="544" text-anchor="middle" font-size="13" font-weight="600" fill="#2d5be3">Input Token  x</text>
        <line x1="210" y1="520" x2="210" y2="496" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- ── Router / Gating Network ── -->
        <rect x="110" y="440" width="200" height="50" rx="10" fill="#fdefd4" stroke="#f5a623" stroke-width="1.8"/>
        <text x="210" y="462" text-anchor="middle" font-size="13" font-weight="700" fill="#c4780a">Router  /  Gating</text>
        <text x="210" y="480" text-anchor="middle" font-size="10.5" fill="#c4780a">G(x) = Softmax(W·x)  →  Top-k</text>

        <!-- Gating output label -->
        <text x="60" y="432" font-size="10" fill="#8a93a8" font-style="italic">gate scores g₁…gₙ</text>

        <!-- ── Experts ── -->
        <!-- Expert 1 (active) -->
        <rect x="18" y="310" width="106" height="80" rx="10" fill="#d9f5de" stroke="#5bbf70" stroke-width="2"/>
        <text x="71" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#237a38">Expert 1</text>
        <text x="71" y="362" text-anchor="middle" font-size="9.5" fill="#237a38">FFN  (active)</text>
        <text x="71" y="378" text-anchor="middle" font-size="9" fill="#237a38">g₁ = 0.62</text>

        <!-- Expert 2 (active) -->
        <rect x="156" y="310" width="106" height="80" rx="10" fill="#d9f5de" stroke="#5bbf70" stroke-width="2"/>
        <text x="209" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#237a38">Expert 2</text>
        <text x="209" y="362" text-anchor="middle" font-size="9.5" fill="#237a38">FFN  (active)</text>
        <text x="209" y="378" text-anchor="middle" font-size="9" fill="#237a38">g₂ = 0.31</text>

        <!-- Expert 3 (inactive) -->
        <rect x="294" y="310" width="106" height="80" rx="10" fill="#f4f4f4" stroke="#c8cad0" stroke-width="1.5"/>
        <text x="347" y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#a0a0a8">Expert 3</text>
        <text x="347" y="362" text-anchor="middle" font-size="9.5" fill="#a0a0a8">FFN  (skipped)</text>
        <text x="347" y="378" text-anchor="middle" font-size="9" fill="#a0a0a8">g₃ = 0.07</text>

        <!-- Expert 4 (inactive) — shown as dots -->
        <text x="210" y="292" text-anchor="middle" font-size="11" fill="#8a93a8">…  N experts total  …</text>

        <!-- Arrows: router → experts -->
        <!-- to expert 1 (active) -->
        <line x1="155" y1="440" x2="92" y2="392" stroke="#f5a623" stroke-width="2" marker-end="url(#arr2-active)" stroke-dasharray="0"/>
        <!-- to expert 2 (active) -->
        <line x1="200" y1="440" x2="209" y2="392" stroke="#f5a623" stroke-width="2" marker-end="url(#arr2-active)"/>
        <!-- to expert 3 (dim) -->
        <line x1="262" y1="440" x2="328" y2="392" stroke="#c8cad0" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2-dim)"/>

        <!-- ── Weighted Sum ── -->
        <rect x="130" y="210" width="160" height="50" rx="10" fill="#ede0fd" stroke="#a678f5" stroke-width="1.8"/>
        <text x="210" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#6c2eb0">Weighted Sum</text>
        <text x="210" y="251" text-anchor="middle" font-size="11" fill="#6c2eb0">y = Σ gᵢ · Eᵢ(x)</text>

        <!-- arrows expert→weighted sum -->
        <line x1="71" y1="310" x2="155" y2="262" stroke="#5bbf70" stroke-width="2" marker-end="url(#arr2)"/>
        <line x1="209" y1="310" x2="209" y2="262" stroke="#5bbf70" stroke-width="2" marker-end="url(#arr2)"/>
        <line x1="347" y1="310" x2="266" y2="262" stroke="#c8cad0" stroke-width="1.2" stroke-dasharray="4 3"/>

        <!-- ── Output ── -->
        <rect x="140" y="130" width="140" height="38" rx="8" fill="#d4f0ec" stroke="#5bc4b8" stroke-width="1.5"/>
        <text x="210" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#1e897e">MoE Output  y</text>
        <line x1="210" y1="210" x2="210" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- Load balancing note -->
        <rect x="30" y="130" width="96" height="46" rx="7" fill="#fde0e0" stroke="#f07575" stroke-width="1.2"/>
        <text x="78" y="150" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Load</text>
        <text x="78" y="163" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c0392b">Balancing</text>
        <text x="78" y="175" text-anchor="middle" font-size="8.5" fill="#c0392b">auxiliary loss</text>

        <!-- Legend -->
        <rect x="18" y="58" width="12" height="12" rx="2" fill="#d9f5de" stroke="#5bbf70" stroke-width="1.5"/>
        <text x="36" y="69" font-size="10" fill="#3a4460">active expert (Top-k selected)</text>
        <rect x="18" y="78" width="12" height="12" rx="2" fill="#f4f4f4" stroke="#c8cad0" stroke-width="1.2"/>
        <text x="36" y="89" font-size="10" fill="#3a4460">inactive expert (skipped)</text>

        <!-- Title note -->
        <text x="210" y="28" text-anchor="middle" font-size="10.5" fill="#8a93a8" font-style="italic">k = 2 out of N = 3 experts selected per token</text>
      </svg>
    </div>
    <div class="architecture-caption">
      A MoE layer replaces the single FFN in a Transformer with N parallel expert FFNs. A learned gating network selects the top-k experts per token. Only selected experts compute outputs, which are then combined by the gate scores — reducing active FLOPs while scaling model capacity.
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       FIGURE 3 — KAN Architecture
  ═══════════════════════════════════════════════════ -->
  <div class="architecture-card">
    <div class="architecture-card-header">
      <h2>Kolmogorov–Arnold Network (KAN)</h2>
      <span class="architecture-tag tag-splines">Learnable Splines</span>
    </div>
    <div class="architecture-card-body">
      <svg width="500" height="560" viewBox="0 0 500 560">
        <defs>
          <pattern id="hatch-anorm" patternUnits="userSpaceOnUse" width="7" height="7">
            <rect width="7" height="7" fill="#eef0f5"/>
            <line x1="0" y1="7" x2="7" y2="0" stroke="#8a93a8" stroke-width="0.9" stroke-opacity="0.45"/>
          </pattern>
          <marker id="arr3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
          </marker>
        </defs>

        <!-- MLP vs KAN label comparison -->
        <text x="120" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#8a93a8">MLP (fixed σ on nodes)</text>
        <text x="370" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#6c2eb0">KAN (learnable φ on edges)</text>
        <line x1="250" y1="15" x2="250" y2="540" stroke="#e0ddd8" stroke-width="1"/>

        <!-- ── MLP side ── -->
        <!-- Input nodes -->
        <circle cx="48" cy="120" r="18" fill="#dce8ff" stroke="#6b9eff" stroke-width="2"/>
        <text x="48" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#2d5be3">x₁</text>
        <circle cx="48" cy="200" r="18" fill="#dce8ff" stroke="#6b9eff" stroke-width="2"/>
        <text x="48" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#2d5be3">x₂</text>
        <circle cx="48" cy="280" r="18" fill="#dce8ff" stroke="#6b9eff" stroke-width="2"/>
        <text x="48" y="285" text-anchor="middle" font-size="11" font-weight="600" fill="#2d5be3">x₃</text>

        <!-- Hidden nodes (MLP) -->
        <circle cx="148" cy="150" r="20" fill="#fdefd4" stroke="#f5a623" stroke-width="2"/>
        <text x="148" y="146" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c4780a">σ(·)</text>
        <text x="148" y="160" text-anchor="middle" font-size="9" fill="#c4780a">h₁</text>

    <div class="architecture-caption">
      Each matrix shows which (query, key) pairs are attended (filled) vs. masked (grey). <b>Full:</b> O(T²), all pairs — standard encoder. <b>Causal:</b> lower-triangular mask for autoregressive decoding. <b>Local window w=3:</b> band of ±1 neighbours only. <b>Global+Local:</b> one global token attends everywhere; others use local windows (Longformer). <b>Dilated:</b> stride-2 skip pattern — wider receptive field, same cost as local. <b>Block sparse:</b> attention within fixed 2×2 blocks — parallelism-friendly. <b>Cross-attention:</b> decoder queries (bottom rows) attend to all encoder keys — used in encoder–decoder models. <b>Random sparse:</b> each query attends to a fixed random subset — O(T log T) (BigBird).
