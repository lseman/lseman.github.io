<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070a12" />
    <title>Electromagnetics Lab</title>
    <link rel="stylesheet" href="ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32"><path d="M18.5 2 7 18h8l-1.5 12L25 14h-8.2L18.5 2Z" /></svg>
        </div>
        <div class="brand-copy">
          <h1>EM Lab</h1>
          <span>Interactive field studio</span>
        </div>
        <nav id="tabs" aria-label="Laboratórios"></nav>
        <div class="header-actions"><button id="reset-view" title="Restaurar visualização">Enquadrar</button><div class="header-status"><i></i><span>Tempo real</span></div></div>
      </header>

      <main class="workspace">
        <aside id="library" aria-label="Biblioteca de simulações e fontes">
          <div class="aside-title"><span>BIBLIOTECA</span><kbd>/</kbd></div>
          <input id="library-search" class="library-search" placeholder="Buscar fenômeno ou fonte…" />
          <div id="library-content"></div>
          <div class="library-tip">Clique para adicionar no centro ou arraste uma fonte diretamente para o canvas.</div>
        </aside>
        <section id="canvas-wrap" aria-label="Área de visualização">
          <canvas id="c"></canvas>
          <div id="info-bar" aria-live="polite"></div>
        </section>
        <aside id="sidebar" aria-label="Inspetor da simulação"><div class="aside-title"><span>INSPETOR</span></div></aside>
      </main>
      <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>
    </div>
    <script type="module" src="ui/main.js"></script>
  </body>
</html>
